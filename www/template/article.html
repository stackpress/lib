<article class="page article-main">
  <div class="page-inner">
    <p class="eyebrow">API reference</p>
    <h1>[[title]]</h1>
    <p class="lede">[[summary]]</p>
    <div class="article-card markdown-body">
      [[html]]
    </div>
    <nav aria-label="Pagination" class="pager">
      [[#?:hasPrev]]
      <a href="[[prevHref]]" title="[[prevTitle]]">Previous: [[prevTitle]]</a>
      [[|]]
      <span></span>
      [[/?:hasPrev]]
      [[#?:hasNext]]
      <a href="[[nextHref]]" title="[[nextTitle]]">Next: [[nextTitle]]</a>
      [[|]]
      <span></span>
      [[/?:hasNext]]
    </nav>
  </div>
</article>
